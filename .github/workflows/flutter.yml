name: Hire Me CI/CD

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            # ───────────────────────────────────────────
            # 1. تنزيل الكود من GitHub
            # ───────────────────────────────────────────
            - name: Checkout Code
              uses: actions/checkout@v4

            # ───────────────────────────────────────────
            # 2. تثبيت Java 17 (مطلوب لبناء Android)
            # ───────────────────────────────────────────
            - name: Setup Java 17
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"

            # ───────────────────────────────────────────
            # 3. تثبيت Flutter
            # ───────────────────────────────────────────
            - name: Install Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.41.6"
                  channel: "stable"
                  cache: true

            # ───────────────────────────────────────────
            # 4. إنشاء ملف .env من GitHub Secrets
            #    (مشروعك يستخدم flutter_dotenv + supabase)
            # ───────────────────────────────────────────
            - name: Create .env file
              run: |
                  echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
                  echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env

            # ───────────────────────────────────────────
            # 5. تنزيل الـ packages
            # ───────────────────────────────────────────
            - name: Install Dependencies
              run: flutter pub get

            # ───────────────────────────────────────────
            # 6. فحص الكود (analyze)
            # ───────────────────────────────────────────
            - name: Analyze Code
              run: flutter analyze --no-fatal-infos --no-fatal-warnings

            # ───────────────────────────────────────────
            # 7. تشغيل الاختبارات
            # ───────────────────────────────────────────
            - name: Run Tests
              run: flutter test --no-pub

            # ───────────────────────────────────────────
            # 8. بناء الـ APK
            # ───────────────────────────────────────────
            - name: Build APK
              run: flutter build apk --release

            # ───────────────────────────────────────────
            # 9. رفع الـ APK كـ artifact على Git Hub
            # ───────────────────────────────────────────
            - name: Upload APK
              uses: actions/upload-artifact@v4
              with:
                  name: hire-me-release-apk
                  path: build/app/outputs/flutter-apk/app-release.apk
                  retention-days: 7

            # ───────────────────────────────────────────
            # 10. رفع الـ APK على Firebase App Distribution
            # ───────────────────────────────────────────
            - name: Upload to Firebase App Distribution
              uses: wzieba/Firebase-Distribution-Github-Action@v1
              with:
                  appId: ${{ secrets.FIREBASE_APP_ID }}
                  serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
                  groups: testers
                  file: build/app/outputs/flutter-apk/app-release.apk
                  releaseNotes: "Build from commit ${{ github.sha }}"
